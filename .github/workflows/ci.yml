name: CI

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -p "test_*.py" -v

      - name: Smoke (CLI entrypoint)
        run: PYTHONPATH=. python -m gov_procurement_framework.cli --help
